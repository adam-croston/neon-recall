<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>NEON RECALL</title>
<style>
:root { color-scheme: dark; }
html, body {
  margin: 0; padding: 0; height: 100%; width: 100%;
  background: #05030d; color: #e8e6ff;
  overflow: hidden; overscroll-behavior: none;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
}
#gl {
  position: fixed; inset: 0; display: block;
  width: 100%; height: 100%;
  touch-action: none;
  z-index: 0;
}
#ui {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
}
#boot-error {
  position: fixed; inset: 0; z-index: 10;
  display: none; place-content: center; align-items: center;
  text-align: center; padding: 8vw;
  background: #05030d; font-size: 16px; line-height: 1.6;
}
#boot-error.show { display: grid; }

</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="ui"></div>
<div id="boot-error"><div>
  <h1 style="font-size:1.4rem;letter-spacing:.1em">UNABLE TO START</h1>
  <p id="boot-error-msg" style="opacity:.75"></p>
</div></div>
<script>
"use strict";(()=>{var je=`/* All chrome. The play field is WebGL and nothing here draws game content.
   \`--heat\` and \`--shake-x/y\` are written once per frame from the same values
   that drive the GL camera, so the DOM heats up and shakes in lockstep with the
   scene. No backdrop-filter anywhere: on some GPUs it forces the canvas onto a
   CPU compositing path and destroys the framerate. */

#ui {
  --heat: 0;
  --shake-x: 0px;
  --shake-y: 0px;

  --cyan: #4ff0ff;
  --magenta: #ff4fd8;
  --gold: #ffd24f;
  --red: #ff5566;
  --ink: #e8e6ff;
  --dim: #8f8ab8;

  --accent: color-mix(in oklab, var(--cyan), var(--gold) calc(var(--heat) * 100%));

  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  color: var(--ink);
}

#ui button {
  pointer-events: auto;
  font: inherit;
  cursor: pointer;
}

/* Themed keyboard-focus fallback for the whole overlay. Replaces the browser's
   default outline (white under color-scheme: dark), which otherwise leaks through
   on any control lacking its own :focus-visible rule \u2014 notably the .icon-btn
   corner toggles. :where() keeps specificity at 0 so each component's own
   :focus-visible (.btn, .vol-slider, .vol-reset, #btn-howto-back) still overrides.
   :focus-visible (not :focus) means a mouse click shows no ring \u2014 only genuine
   keyboard focus is indicated. */
:where(#ui) :focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 3px;
}

.mono {
  font-family: ui-monospace, 'Cascadia Mono', Menlo, Consolas, monospace;
  font-variant-numeric: tabular-nums;
}

/* ---------- pages ---------- */

.page {
  /* The gutter between a page's card and the screen edge. Fluid so it doesn't eat
     a phone's whole width, and capped so it doesn't leave a desktop card marooned
     in the middle of an ocean of padding. Exposed as a variable because the panels
     size themselves against it \u2014 \`max-height: 100dvh - 2 * gutter\` \u2014 and the two
     drifting apart is what puts a card's last button below the fold. */
  --page-pad: clamp(0.9rem, 6vw, 4rem);

  position: absolute;
  inset: 0;
  display: grid;
  /* \`safe\` so a panel taller than the viewport (small phones, landscape) spills
     only downward into the scroll area instead of being clipped off the top \u2014
     otherwise plain \`center\` hides the heading AND puts the panel's absolutely
     positioned Back button below the fold with no way to reach it. */
  place-content: safe center;
  justify-items: center;
  gap: 1.5rem;
  padding: var(--page-pad);
  text-align: center;
  /* Let the page itself scroll when its content overflows vertically. */
  overflow-y: auto;
  /* #ui is pointer-events:none (so the canvas gets gameplay touches); the page
     must opt back in or touch/wheel scroll passes straight through to the canvas
     and the overflowing content can't be scrolled. Hidden pages stay inert via
     visibility:hidden below, so this only captures input while a page is shown. */
  pointer-events: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.35s ease, visibility 0.35s;
}
.page.show {
  opacity: 1;
  visibility: visible;
}

/* Hidden pages must stop COSTING anything.

   \`visibility: hidden\` hides a subtree but does NOT stop its CSS animations \u2014
   they keep ticking style recalc and repaint for the whole session. Two of ours
   are \`infinite\` and animate \`text-shadow\` (not a compositable property) with
   blur radii up to 90px: \`.title\`'s pulse and \`.pb-crown\`'s glow. Both sit on
   pages that are never unmounted, so once the title had been seen \u2014 and forever
   after any personal best \u2014 they repainted large blurred text behind the live
   game, directly over the WebGL canvas.

   Pausing rather than disabling keeps them correct: a page that comes back
   resumes its animation instead of restarting mid-phrase. \`content-visibility\`
   would be stronger still, but it would break the opacity fade these rely on. */
.page:not(.show),
.page:not(.show) * {
  animation-play-state: paused !important;
}

.title {
  /* \`min(9vw, 11vh)\` so the wordmark answers to whichever axis is actually scarce.
     Width alone (plain 9vw) left it enormous in a short, wide window \u2014 a laptop in
     landscape or a resized desktop tab \u2014 where it pushed the buttons off the card. */
  font-size: clamp(1.7rem, min(9vw, 11vh), 5rem);
  font-weight: 800;
  letter-spacing: 0.16em;
  margin: 0;
  line-height: 1;
  color: #fff;
  /* Stacked shadows fake bloom convincingly, and cost nothing. */
  text-shadow:
    0 0 8px var(--cyan),
    0 0 28px var(--cyan),
    0 0 70px rgba(79, 240, 255, 0.55);
  animation: title-pulse 3.4s ease-in-out infinite;
}
@keyframes title-pulse {
  0%, 100% { text-shadow: 0 0 8px var(--cyan), 0 0 28px var(--cyan), 0 0 70px rgba(79,240,255,.5); }
  50%      { text-shadow: 0 0 10px var(--magenta), 0 0 36px var(--magenta), 0 0 90px rgba(255,79,216,.5); }
}

.tagline {
  margin: -0.6rem 0 0;
  font-size: 0.82rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--dim);
}

.btn {
  --btn: var(--cyan);
  background: transparent;
  color: var(--btn);
  border: 1px solid color-mix(in oklab, var(--btn), transparent 45%);
  border-radius: 999px;
  padding: 0.85rem 2.6rem;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--btn);
  box-shadow: 0 0 18px -6px var(--btn), inset 0 0 18px -12px var(--btn);
  transition: transform 0.14s cubic-bezier(.2,.9,.3,1.4), box-shadow 0.2s, background 0.2s;
}
.btn:hover, .btn:focus-visible {
  transform: scale(1.05);
  background: color-mix(in oklab, var(--btn), transparent 88%);
  box-shadow: 0 0 34px -6px var(--btn), inset 0 0 22px -10px var(--btn);
  outline: none;
}
.btn:active { transform: scale(0.97); }
/* Disabled: dim it, kill the glow and hover lift, and let the cursor tell the
   story. Used by the daily-only "Copy results" button on non-daily runs. */
.btn:disabled {
  --btn: var(--dim);
  opacity: 0.4;
  cursor: not-allowed;
  text-shadow: none;
  box-shadow: none;
}
.btn:disabled:hover, .btn:disabled:focus-visible {
  transform: none;
  background: transparent;
  box-shadow: none;
}
.btn.primary { --btn: var(--gold); padding: 1.05rem 3.4rem; font-size: 0.95rem; }
.btn.ghost   { --btn: var(--dim); }

.btn-row { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }

/* The daily's call-to-action on the title: the primary button plus a one-line
   hook, grouped tight so the hook reads as the button's subtitle rather than a
   free-floating grid row. */
.cta { display: grid; justify-items: center; gap: 0.55rem; }
.daily-tag {
  margin: 0;
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
}

/* The nudge on a Practice results screen, pointing at the shareable Daily. */
.results-nudge {
  margin: 0;
  max-width: 24rem;
  font-size: 0.82rem;
  line-height: 1.5;
  color: var(--dim);
}

/* ---------- how to play ---------- */

.panel {
  position: relative;
  /* border-box so the width cap below includes the panel's own padding+border;
     under the default content-box they'd add on top and overflow the viewport. */
  box-sizing: border-box;
  /* Cap at 34rem on desktop, but never exceed the available width on phones
     narrower than that \u2014 otherwise the card overflows and clips its text on
     the right. A percentage here is circular (the centring grid track sizes to
     the panel's own content), so measure against the viewport instead, minus the
     page's gutter on each side. */
  max-width: min(34rem, calc(100vw - var(--page-pad) * 2));
  /* Load-bearing. The panel is a grid item, and a grid item's default
     \`min-width: auto\` is its min-content size \u2014 which WINS over max-width. Any
     child too wide to shrink (the results screen's five-button row) therefore
     dragged the whole card past the cap and off the right edge of a phone. */
  min-width: 0;
  background: rgba(10, 8, 26, 0.86);
  border: 1px solid rgba(120, 110, 200, 0.28);
  border-radius: 18px;
  /* The extra bottom padding is the button's room. Without it the Back button
     would sit on top of the closing paragraph rather than below it. */
  padding: 2rem 1.8rem 4.6rem;
  text-align: left;
  box-shadow: 0 24px 80px -30px #000;
}

/* Menu and results pages share the card look but lay their content out centred,
   with the buttons in normal flow inside the panel \u2014 so the bottom padding tuned
   for how-to's absolute Back button is dropped here for a symmetric card.

   Both cards also cap themselves at the viewport and scroll their own overflow,
   for the same reason how-to does: the menu's Practice/How-to row and the results
   screen's Again/Menu row are the only ways off those pages, and a tall card (a
   full results tally, a short landscape window, a large OS font) used to push them
   past the bottom edge. Scrolling inside the card rather than on the page keeps the
   card's frame parked on screen while its contents move. */
.panel-center {
  /* Padding and gap shrink with the viewport so a small screen spends its space on
     content instead of on the card's own margins. */
  padding: clamp(1.1rem, 3.4vmin, 2.4rem) clamp(0.9rem, 2.8vmin, 1.8rem);
  text-align: center;
  display: grid;
  /* One explicit \`minmax(0, 1fr)\` column instead of an implicit auto one: an auto
     track sizes to its widest item's max-content, so the button row (five buttons
     laid out on one line before it wraps) set the card's width. Pinning the track
     to the card's own width makes the row wrap instead \u2014 and stops the panel from
     becoming horizontally scrollable, since \`overflow-y: auto\` computes
     \`overflow-x\` to \`auto\` as well. */
  grid-template-columns: minmax(0, 1fr);
  justify-items: center;
  gap: clamp(0.8rem, 2.4vmin, 1.5rem);
  max-height: calc(100vh - var(--page-pad) * 2);
  max-height: calc(100dvh - var(--page-pad) * 2);
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
/* The tagline hugs the title; the grid gap already spaces it, so cancel the
   negative margin it carries from the title-page layout. */
.panel-center .tagline { margin-top: 0; }

/* The how-to card is capped at the viewport so the heading and the Back button
   are always on screen; only the steps scroll. Without the cap the card grew
   past the bottom edge on short/landscape viewports and the whole page scrolled
   instead, pushing both the title and the only way out below the fold.
   The page adds its gutter top and bottom, hence subtracting it twice. dvh
   (not vh) so mobile browser chrome collapsing doesn't leave the card overhung. */
#howto-page .panel {
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - var(--page-pad) * 2);
  max-height: calc(100dvh - var(--page-pad) * 2);
  /* The Back button is in normal flow here, so the deep bottom padding that
     .panel reserves for its absolutely positioned variant is not wanted. */
  padding-bottom: 1.6rem;
}

/* The only scrolling part. min-height:0 is load-bearing: a flex item's default
   min-height:auto refuses to shrink below its content, so the cap above would
   be silently ignored and the card would overflow exactly as before. */
.howto-scroll {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
  /* Room for the scrollbar so the text doesn't run under it. */
  padding-right: 0.6rem;
}
/* One slim, themed scrollbar for every card that scrolls \u2014 the how-to steps and
   the menu/results cards \u2014 so the default chrome bar never lands on the neon. */
.howto-scroll::-webkit-scrollbar,
.panel-center::-webkit-scrollbar { width: 8px; }
.howto-scroll::-webkit-scrollbar-track,
.panel-center::-webkit-scrollbar-track { background: transparent; }
.howto-scroll::-webkit-scrollbar-thumb,
.panel-center::-webkit-scrollbar-thumb {
  background: rgba(120, 110, 200, 0.45);
  border-radius: 999px;
}
.howto-scroll::-webkit-scrollbar-thumb:hover,
.panel-center::-webkit-scrollbar-thumb:hover { background: rgba(120, 110, 200, 0.7); }
.howto-scroll,
.panel-center { scrollbar-width: thin; scrollbar-color: rgba(120, 110, 200, 0.45) transparent; }

/* Sits at the card's foot, centred \u2014 so it reads as part of the card and can't
   be mistaken for chrome floating behind it. */
#btn-howto-back {
  flex: none;
  align-self: center;
  margin-top: 1.4rem;
}
.panel h2 {
  margin: 0 0 1.2rem;
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
}
.panel ol { margin: 0; padding-left: 1.3rem; line-height: 1.75; color: #cfcaf0; }
.panel li { margin-bottom: 0.7rem; }
.panel li b { color: #fff; }
.panel .note {
  margin-top: 1.4rem;
  padding-top: 1.1rem;
  border-top: 1px solid rgba(120, 110, 200, 0.2);
  font-size: 0.85rem;
  color: var(--dim);
  line-height: 1.6;
}
.key { color: var(--gold); font-weight: 700; }

/* ---------- HUD ---------- */

#hud {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
  transform: translate(var(--shake-x), var(--shake-y));
}
#hud.show { opacity: 1; }

.hud-top {
  position: absolute;
  top: max(1.1rem, env(safe-area-inset-top));
  left: 0;
  right: 0;
  /* Three columns with equal (minmax(0,1fr)) sides and an auto middle: the middle
     track is always screen-centred no matter how wide the combo or level get, so
     the score sits dead-centre. \`space-between\` on a flex row can't do this \u2014 it
     only pins the outer items, leaving the middle off-centre whenever the combo
     (wide) and level (narrow) differ. */
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  align-items: start;
  padding: 0 max(1.2rem, env(safe-area-inset-left)) 0 max(1.2rem, env(safe-area-inset-right));
}

.hud-label {
  font-size: 0.6rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 0.25rem;
}

/* The score column. Centred as a block by the grid's auto middle track; this
   centres the three lines (label, score, PB chase) against each other, so the
   caption and the chase stay under the middle of the number as it grows. */
.hud-center { text-align: center; }

#score {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 700;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 12px var(--accent), 0 0 40px color-mix(in oklab, var(--accent), transparent 55%);
  transition: transform 0.1s;
}
#score.bump { transform: scale(1.12); }

/* Current-phase title \u2014 IMPRINT / HOLD / RECALL. Centred directly above the
   clock ring that surrounds the board, so the instruction lands in the player's
   central field of view rather than in a corner. --ring-top is the ring's top
   edge in px, pushed from the live layout; the extra gap clears the ring's stroke
   and glow so the label sits cleanly above it. The % is a pre-first-layout
   fallback. Same neon uppercase idiom as the HUD labels but brighter and glowing,
   so it reads as a title, not a caption. */
#phase {
  position: absolute;
  left: 50%;
  top: var(--ring-top, 22%);
  /* Bigger gap so the bottom of the (larger) text sits fully clear of the ring's glow. */
  transform: translate(-50%, calc(-100% - 1.4rem));
  /* Floor: the score is centred at the top of the HUD, and this label is centred
     too, so on a tall board \u2014 where the ring's top edge climbs towards the top of
     the screen \u2014 the two used to land on each other. Margin-top shifts an
     absolutely positioned box down, so this gives back only the distance the
     label would have risen above the score block, and is a no-op whenever the ring
     leaves enough room. 10.4rem is the ring-top at which the label's own height
     (1.2 line-height on a 2.1rem cap) plus its gap clears the score block. */
  margin-top: max(0px, calc(10.4rem - var(--ring-top, 22%)));
  white-space: nowrap;
  pointer-events: none;
  font-size: clamp(1.6rem, 4.8vw, 2.1rem);
  line-height: 1.2;
  font-weight: 800;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan), 0 0 34px color-mix(in oklab, var(--cyan), transparent 55%);
  opacity: 0;
  transition: opacity 0.3s;
}
#phase.show { opacity: 1; }

.hud-right { text-align: right; }

#level {
  font-size: clamp(1.1rem, 3.4vw, 1.5rem);
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}

/* Combo readout. Lives at the top-left of the HUD row, so it never sits over the
   board and covers the tiles you're reading. The headline is the streak COUNT
   (tiles in a row); the score multiplier rides beneath it, small and clearly
   labelled, so the two are never confused. Colour, glow, and pulse are all a
   function of --heat, so it warms up as the streak builds.
   \`--combo-scale\` grows it a touch with each additional hit; it scales from its
   top-left corner so the growth stays clear of the board below and the readout
   stays pinned to the screen edge instead of creeping outward. */
#combo {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  text-align: left;
  gap: 0.1rem;
  line-height: 1;
  /* Drop it down so it sits level with the big score number, not the labels. */
  margin-top: 0.95rem;
  transform: scale(var(--combo-scale, 1));
  transform-origin: top left;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
#combo.show { opacity: calc(0.6 + var(--heat) * 0.4); }

/* The streak count \u2014 the big, glowing headline number. */
.combo-count {
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 800;
  color: var(--accent);
  text-shadow:
    0 0 calc(8px + var(--heat) * 20px) var(--accent),
    0 0 calc(24px + var(--heat) * 48px) var(--accent);
}

/* The score multiplier \u2014 deliberately small and dim, so it reads as a footnote
   to the count above rather than competing with it. Empty (below the first tier)
   collapses to nothing. */
.combo-score {
  font-size: clamp(0.55rem, 1.6vw, 0.72rem);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
}
.combo-score:empty { display: none; }

/* ---------- recall clock ----------
   The clock itself is the ring around the board, drawn in WebGL. The DOM keeps
   only the numeric readout, sitting under the board where it can be checked
   without pulling the eye off the tiles. */

#clock-wrap {
  position: absolute;
  left: 50%;
  bottom: max(2.6rem, calc(env(safe-area-inset-bottom) + 1.8rem));
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.3s;
}
#clock-wrap.show { opacity: 1; }

#clock-text {
  text-align: center;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
}
#clock-text.warn { color: var(--gold); text-shadow: 0 0 12px var(--gold); }
#clock-text.crit {
  color: var(--red);
  text-shadow: 0 0 16px var(--red);
  animation: crit-pulse 0.45s ease-in-out infinite;
}
@keyframes crit-pulse { 50% { opacity: 0.4; } }

/* A correct tap buys time back \u2014 make the clock visibly jump, so the reward is
   felt and not merely accounted for. \`crit\` wins on an emergency. */
#clock-text.gain:not(.crit) {
  animation: clock-gain 0.32s cubic-bezier(.2,.9,.3,1.4);
}
@keyframes clock-gain {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.22); color: #7dffb0; text-shadow: 0 0 18px #7dffb0; }
  100% { transform: scale(1); }
}

/* The personal-best chase: the number you're hunting, right under your own. */
#pb-chase {
  margin-top: 0.3rem;
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
#pb-chase.show { opacity: 0.7; }
#pb-chase.passed {
  opacity: 1;
  text-shadow: 0 0 12px var(--gold);
}

/* ---------- banner ---------- */

#banner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(1.6rem, 6vw, 3rem);
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  white-space: nowrap;
  color: #fff;
  opacity: 0;
  pointer-events: none;
}
#banner.pop {
  animation: banner-pop 1.1s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes banner-pop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.6); }
  18%  { opacity: 1; transform: translate(-50%,-50%) scale(1.06); }
  70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.02); }
}

/* ---------- results ---------- */

.results-score {
  /* Height-aware like .title: on a short window the tally above it already fills
     the card, and a 13vw number would be the thing that overflows. */
  font-size: clamp(2.2rem, min(13vw, 13vh), 6rem);
  font-weight: 800;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 16px var(--gold), 0 0 60px rgba(255, 210, 79, 0.5);
}

.breakdown {
  display: grid;
  gap: 0.45rem;
  /* Fill the card and cap at a comfortable reading width. Measuring against the
     viewport instead (92vw) overshot the card's inner width on phones, since the
     page gutter and the card's own padding both sit outside it. */
  width: 100%;
  max-width: 26rem;
  margin: 0.5rem 0 0.4rem;
}
.row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1rem;
  padding: 0.5rem 0.9rem;
  border-radius: 9px;
  background: rgba(120, 110, 200, 0.07);
  font-size: 0.9rem;
  opacity: 0;
  transform: translateY(10px);
}
/* Each row doesn't just fade \u2014 it overshoots and flashes a brighter fill as it
   lands, so the reveal reads as one item being *highlighted*, then settling. */
.row.in { animation: row-in 0.5s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes row-in {
  0%   { opacity: 0; transform: translateY(10px) scale(0.98); background: rgba(120,110,200,.07); }
  55%  { opacity: 1; transform: translateY(0) scale(1.03); background: rgba(120,110,200,.2); }
  100% { opacity: 1; transform: none; background: rgba(120,110,200,.07); }
}
.row .k { color: var(--dim); letter-spacing: 0.1em; font-size: 0.72rem; text-transform: uppercase; }
.row .rv { display: flex; align-items: baseline; gap: 0.6rem; }
.row .v { font-weight: 700; color: #fff; }
.row .best { color: var(--dim); font-size: 0.72rem; font-weight: 600; }
.row.bad .v { color: var(--red); }

/* A record row: a stronger gold-tinted landing, a lingering gold border, and a
   gold value that outglows the ordinary white ones. Placed after .row.bad so a
   record on the Mistakes row shows gold, not red. */
.row.pb.in { animation: row-in-pb 0.6s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes row-in-pb {
  0%   { opacity: 0; transform: translateY(10px) scale(0.98); }
  55%  { opacity: 1; transform: translateY(0) scale(1.06);
         background: rgba(255,210,79,.22); box-shadow: 0 0 26px rgba(255,210,79,.45); }
  100% { opacity: 1; transform: none;
         background: rgba(255,210,79,.1); box-shadow: 0 0 0 rgba(255,210,79,0); }
}
.row.pb { border: 1px solid rgba(255, 210, 79, 0.35); }
.row.pb .v { color: var(--gold); text-shadow: 0 0 12px rgba(255, 210, 79, 0.7); }
.pb-badge {
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 800;
  color: #1a1330;
  background: var(--gold);
  border-radius: 999px;
  padding: 0.14rem 0.5rem;
  box-shadow: 0 0 14px rgba(255, 210, 79, 0.6);
  animation: badge-pop 0.5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes badge-pop {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* The score finale block: hidden until the tally reaches it, then slides in. */
.score-reveal {
  display: grid;
  justify-items: center;
  gap: 0.15rem;
  margin-top: 0.4rem;
  opacity: 0;
  transform: translateY(12px);
}
.score-reveal.in { animation: score-in 0.6s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes score-in { to { opacity: 1; transform: none; } }
.score-cap { margin-bottom: 0.05rem; }
.score-best { color: var(--dim); font-size: 0.8rem; letter-spacing: 0.05em; min-height: 1em; }
/* When the score is an all-time best, it swells and flares gold as it lands. */
#results-score.pb { animation: score-pb-pulse 1s ease-out; }
@keyframes score-pb-pulse {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.14); text-shadow: 0 0 30px var(--gold), 0 0 90px rgba(255,210,79,.85); }
  100% { transform: scale(1); }
}
.pb-crown {
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 18px var(--gold);
  min-height: 1.2em;
  opacity: 0;
}
.pb-crown.show {
  animation: crown-pop 0.6s cubic-bezier(.16,1,.3,1) forwards,
             crown-glow 1.8s ease-in-out 0.6s infinite;
}
@keyframes crown-pop {
  0%   { opacity: 0; transform: scale(0.6); }
  60%  { opacity: 1; transform: scale(1.15); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes crown-glow {
  0%, 100% { text-shadow: 0 0 18px var(--gold); }
  50%      { text-shadow: 0 0 30px var(--gold), 0 0 60px rgba(255,210,79,.7); }
}

/* Sparkle burst layer: fixed, click-through, above the panel. Sparks are cheap
   CSS-animated dots that fly out radially, droop under a touch of gravity, and
   remove themselves on animationend (see spark() in overlay.ts). */
.results-fx {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: hidden;
}
.spark {
  position: absolute;
  width: var(--sz);
  height: var(--sz);
  margin: calc(var(--sz) / -2) 0 0 calc(var(--sz) / -2);
  border-radius: 50%;
  background: var(--c);
  box-shadow: 0 0 6px var(--c), 0 0 12px var(--c);
  opacity: 0;
  animation-name: spark-fly;
  animation-timing-function: cubic-bezier(.12,.66,.3,1);
  animation-fill-mode: forwards;
}
@keyframes spark-fly {
  0%   { transform: translate(0, 0) scale(0.35); opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: translate(var(--dx), calc(var(--dy) + 54px)) scale(0.7); opacity: 0; }
}

#pb-note {
  font-size: 0.75rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 14px var(--gold);
  min-height: 1.2em;
}
#pb-note.muted {
  color: var(--dim);
  text-shadow: none;
}

#share-out {
  box-sizing: border-box;
  width: 100%;
  max-width: 26rem;
  min-height: 8rem;
  background: rgba(5, 3, 13, 0.9);
  border: 1px solid rgba(120, 110, 200, 0.3);
  border-radius: 10px;
  color: var(--ink);
  padding: 0.8rem;
  font-size: 0.8rem;
  line-height: 1.5;
  resize: none;
  display: none;
  pointer-events: auto;
}
#share-out.show { display: block; }

/* ---------- corner controls + notes ---------- */

.corner {
  position: absolute;
  bottom: max(1rem, env(safe-area-inset-bottom));
  right: max(1rem, env(safe-area-inset-right));
  display: flex;
  gap: 0.5rem;
}
.icon-btn {
  position: relative;
  width: 2.5rem;
  height: 2.5rem;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: rgba(10, 8, 26, 0.6);
  border: 1px solid rgba(120, 110, 200, 0.25);
  color: var(--dim);
  font-size: 1rem;
  transition: color 0.2s, border-color 0.2s, transform 0.14s;
}
.icon-btn svg { width: 1.35rem; height: 1.35rem; display: block; }
.icon-btn:hover { color: var(--cyan); border-color: var(--cyan); transform: scale(1.08); }

/* The on-screen pause button \u2014 a phone has no Escape key, so this is the only way
   to pause on touch. Bottom-left, mirroring the settings cluster at bottom-right
   and clear of the board's central tap zone. It lives inside #hud, so it shows and
   hides with the run automatically, and the pause veil covers it once paused. A
   hair larger than the setting toggles (a full ~44px touch target) and brighter by
   default, since it's a primary control rather than a tucked-away setting. */
.hud-pause {
  position: absolute;
  left: max(1rem, env(safe-area-inset-left));
  bottom: max(1rem, env(safe-area-inset-bottom));
  width: 2.75rem;
  height: 2.75rem;
  color: var(--ink);
}
/* The HUD hides via opacity alone, and a 0-opacity button still takes clicks \u2014 so
   without this the invisible pause button would swallow taps at bottom-left on the
   title and results screens. Only interactive while the run's HUD is shown. */
#hud:not(.show) .hud-pause { pointer-events: none; }

/* "Off" state for any corner toggle (music, sound FX, motion FX): fade nothing,
   just mark it with a red ring and a diagonal slash across the glyph, so off
   reads as off at a glance. The slash is drawn on top (::after is the last box
   painted) with a light halo so it stays legible over the icon. */
.icon-btn.off { border-color: var(--red); }
.icon-btn.off::after {
  content: '';
  position: absolute;
  left: 10%;
  right: 10%;
  top: calc(50% - 1.5px);
  height: 3px;
  border-radius: 3px;
  background: var(--red);
  box-shadow: 0 0 4px rgba(0, 0, 0, 0.9), 0 0 8px var(--red);
  transform: rotate(-45deg);
}

/* ---------- per-toggle volume pop-ups ---------- */

/* Each channel toggle sits in a .ctrl so its slider pill can anchor above it. */
.ctrl { position: relative; display: flex; }

/* The pop wrapper bridges the visual gap between the toggle and the pill: its box
   sits directly on top of the toggle (bottom: 100%) and its padding-bottom is a
   transparent, hover-active strip spanning the gap \u2014 so moving from the toggle up
   to the slider never leaves the control and never drops the hover.
   #ui is pointer-events:none, so opt back in; the *hidden* state is gated by
   \`visibility\`, whose transition is DELAYED on hide. That keeps the pill
   interactive all through the fade, so moving back onto it before it vanishes
   cancels the fade and brings it fully back \u2014 and once hidden it can't block the
   board. */
.vol-pop {
  position: absolute;
  left: 50%;
  bottom: 100%;
  transform: translateX(-50%) translateY(5px);
  /* max-content so translateX(-50%) uses the pill's real width and centres it on
     the toggle \u2014 without it, shrink-to-fit in the narrow .ctrl mis-sizes the box
     and the pill drifts right. */
  width: max-content;
  padding-bottom: 0.5rem;
  display: flex;
  justify-content: center;
  pointer-events: auto;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s 0.16s;
}
@media (hover: hover) {
  .ctrl:hover > .vol-pop {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%);
    transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s 0s;
  }
}
.ctrl.pop-open > .vol-pop {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%);
  transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s 0s;
}

.vol-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  padding: 0.6rem 0.35rem 0.7rem;
  border-radius: 999px;
  background: rgba(10, 8, 26, 0.92);
  border: 1px solid rgba(120, 110, 200, 0.28);
  box-shadow: 0 24px 80px -30px #000;
}
.vol-pct {
  font-size: 0.66rem;
  color: var(--dim);
  font-variant-numeric: tabular-nums;
}
/* Holds the vertical (rotated) slider; the box is the slider's travel. Tall enough
   that the thumb has real distance to cover \u2014 a short travel makes fine adjustment
   fiddly on every platform and near-unusable under a fingertip. Touch gets more
   still, below. */
.vol-slot { position: relative; height: 12rem; width: 1.75rem; }

/* Self-drawn groove, centred as a plain element. webkit's own slider track sits a
   couple px off-centre under the -90\xB0 rotate (unfixable via the pseudo), so we make
   that track transparent and draw the visible groove here; the input's thumb, which
   IS centred, rides over it. */
.vol-track {
  position: absolute;
  left: 50%;
  top: 0.5rem;
  bottom: 0.5rem;
  width: 4px;
  transform: translateX(-50%);
  border-radius: 3px;
  background: rgba(120, 110, 200, 0.3);
}

/* A horizontal range rotated to vertical (min at the bottom). Reliable across
   browsers and reuses one set of track/thumb styles. */
.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-90deg);
  width: 12rem; /* becomes the vertical travel after the rotate \u2014 matches .vol-slot */
  height: 1.6rem; /* the hit area across the track (becomes horizontal after rotate) */
  /* Kill the UA default margin on range inputs: under the -90\xB0 rotate it turns
     into a horizontal shift, nudging the slider a couple px off the pill's centre. */
  margin: 0;
  background: transparent;
  cursor: pointer;
}
/* Transparent: the visible groove is .vol-track. This still defines the thumb's rail. */
.vol-slider::-webkit-slider-runnable-track { height: 4px; background: transparent; }
.vol-slider::-moz-range-track { height: 4px; background: transparent; }
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 15px;
  height: 15px;
  margin-top: -5.5px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
}
.vol-slider::-moz-range-thumb {
  width: 15px;
  height: 15px;
  border: none;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
}
.vol-slider:focus-visible { outline: 2px solid var(--cyan); outline-offset: 4px; border-radius: 3px; }

/* Touch: size the control to a fingertip, not a mouse cursor. \`pointer: coarse\` is
   the honest signal here \u2014 CSS physical units (mm/cm) are NOT physically accurate on
   mobile (they're pinned to the 96dpi reference, then scaled by the viewport), so the
   reliable way to hit ~9-10mm targets is to enlarge for coarse pointers. The thumb
   grows to a grabbable disc, the hit strip widens to the ~44px touch-target minimum,
   and the travel gets taller so a drag has real resolution. The corner controls pop
   upward from the bottom of the screen, so there's height to spare. */
@media (pointer: coarse) {
  .vol-slot { height: 14rem; width: 2.75rem; }
  .vol-slider { width: 14rem; height: 2.75rem; }
  .vol-slider::-webkit-slider-thumb { width: 26px; height: 26px; margin-top: -11px; }
  .vol-slider::-moz-range-thumb { width: 26px; height: 26px; }
}

/* Muted/off: a red slash across the thumb (mirrors the corner icon's slash) so the
   pill shows the channel is silenced while the thumb still marks the chosen level.
   Baked into the thumb as a gradient band, since a pseudo-element can't host a
   child. The track also dims so the whole control reads as off. */
.ctrl.silent .vol-track { background: rgba(120, 110, 200, 0.18); }
.ctrl.silent .vol-slider::-webkit-slider-thumb {
  background:
    linear-gradient(45deg, transparent 37%, var(--red) 37%, var(--red) 63%, transparent 63%),
    var(--cyan);
  box-shadow: 0 0 6px var(--red);
}
.ctrl.silent .vol-slider::-moz-range-thumb {
  background:
    linear-gradient(45deg, transparent 37%, var(--red) 37%, var(--red) 63%, transparent 63%),
    var(--cyan);
  box-shadow: 0 0 6px var(--red);
}

#storage-note {
  position: absolute;
  /* Sits above the bottom-left pause button so the two never overlap during a run
     (the note is a persistent element; the button appears with the HUD). */
  bottom: calc(max(1rem, env(safe-area-inset-bottom)) + 3.4rem);
  left: max(1rem, env(safe-area-inset-left));
  max-width: 16rem;
  font-size: 0.66rem;
  line-height: 1.5;
  color: var(--dim);
  opacity: 0.75;
  display: none;
}
#storage-note.show { display: block; }

#pause-veil {
  position: absolute;
  inset: 0;
  display: none;
  place-content: center;
  background: rgba(5, 3, 13, 0.78);
  /* Capture presses so the dimmed board behind can't be tapped while paused. */
  pointer-events: auto;
}
#pause-veil.show { display: grid; }

.pause-panel {
  display: grid;
  justify-items: center;
  gap: 1.6rem;
  padding: 2.2rem 2.6rem;
  background: rgba(10, 8, 26, 0.86);
  border: 1px solid rgba(120, 110, 200, 0.28);
  border-radius: 18px;
  box-shadow: 0 24px 80px -30px #000;
}
.pause-title {
  margin: 0;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink);
  text-shadow: 0 0 18px var(--cyan);
}
.pause-actions {
  display: grid;
  gap: 0.7rem;
  width: min(72vw, 15rem);
}
/* The pause buttons stack full-width; the shared .btn padding is tuned for a
   row, so let the grid own the width and keep the horizontal padding modest. */
.pause-actions .btn { width: 100%; padding-left: 1.4rem; padding-right: 1.4rem; }

@media (prefers-reduced-motion: reduce) {
  .title, #clock-fill.crit { animation: none; }
  .page, .btn, #hud, #score { transition-duration: 0.01ms; }
}

 * head would lurch and change speed as it rounds each corner. The clock would
 * literally tick at a different rate depending on where it was. So compute true
 * arc length: fold into one quadrant, work out whether the nearest point lies on
 * a straight edge or a corner arc, accumulate, then unfold.

  vec2 e = b - r;                // half-extents of the straight sections
  float quarter = e.x + e.y + r * PI * 0.5;  // arc length of one quadrant

  vec2 q = abs(p);
  vec2 c = q - e;

    // length, offset by the straight run that precedes it.
    float ang = atan(c.x, c.y);        // 0 at the top edge, PI/2 at the side
    lenInQuadrant = e.x + r * ang;

    lenInQuadrant = e.x + r * (PI * 0.5) + (e.y - q.y);

      <div class="howto-scroll">
      <ol>
        <li>Nine tiles, scrambled, showing <span class="key">0</span> to <span class="key">8</span>. They light up <b>in order</b> to show you the path — watch it, then keep watching after it stops.</li>
        <li>The <b>glowing ring</b> around the board is your time. When it empties, the symbols vanish.</li>
