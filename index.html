<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>NEON RECALL</title>
<style>
:root { color-scheme: dark; }
html, body {
  margin: 0; padding: 0; height: 100%; width: 100%;
  background: #05030d; color: #e8e6ff;
  overflow: hidden; overscroll-behavior: none;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
}
#gl {
  position: fixed; inset: 0; display: block;
  width: 100%; height: 100%;
  touch-action: none;
  z-index: 0;
}
#ui {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
}
#boot-error {
  position: fixed; inset: 0; z-index: 10;
  display: none; place-content: center; align-items: center;
  text-align: center; padding: 8vw;
  background: #05030d; font-size: 16px; line-height: 1.6;
}
#boot-error.show { display: grid; }

</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="ui"></div>
<div id="boot-error"><div>
  <h1 style="font-size:1.4rem;letter-spacing:.1em">UNABLE TO START</h1>
  <p id="boot-error-msg" style="opacity:.75"></p>
</div></div>
<script>
"use strict";(()=>{var Ge=`/* All chrome. The play field is WebGL and nothing here draws game content.
   \`--heat\` and \`--shake-x/y\` are written once per frame from the same values
   that drive the GL camera, so the DOM heats up and shakes in lockstep with the
   scene. No backdrop-filter anywhere: on some GPUs it forces the canvas onto a
   CPU compositing path and destroys the framerate. */

#ui {
  --heat: 0;
  --shake-x: 0px;
  --shake-y: 0px;

  --cyan: #4ff0ff;
  --magenta: #ff4fd8;
  --gold: #ffd24f;
  --red: #ff5566;
  --ink: #e8e6ff;
  --dim: #8f8ab8;

  --accent: color-mix(in oklab, var(--cyan), var(--gold) calc(var(--heat) * 100%));

  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  color: var(--ink);
}

#ui button {
  pointer-events: auto;
  font: inherit;
  cursor: pointer;
}

/* Themed keyboard-focus fallback for the whole overlay. Replaces the browser's
   default outline (white under color-scheme: dark), which otherwise leaks through
   on any control lacking its own :focus-visible rule \u2014 notably the .icon-btn
   corner toggles. :where() keeps specificity at 0 so each component's own
   :focus-visible (.btn, .vol-slider, .vol-reset, #btn-howto-back) still overrides.
   :focus-visible (not :focus) means a mouse click shows no ring \u2014 only genuine
   keyboard focus is indicated. */
:where(#ui) :focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 3px;
}

.mono {
  font-family: ui-monospace, 'Cascadia Mono', Menlo, Consolas, monospace;
  font-variant-numeric: tabular-nums;
}

/* ---------- pages ---------- */

.page {
  position: absolute;
  inset: 0;
  display: grid;
  place-content: center;
  justify-items: center;
  gap: 1.5rem;
  padding: 6vw;
  text-align: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.35s ease, visibility 0.35s;
}
.page.show {
  opacity: 1;
  visibility: visible;
}

.title {
  font-size: clamp(2.4rem, 9vw, 5rem);
  font-weight: 800;
  letter-spacing: 0.16em;
  margin: 0;
  line-height: 1;
  color: #fff;
  /* Stacked shadows fake bloom convincingly, and cost nothing. */
  text-shadow:
    0 0 8px var(--cyan),
    0 0 28px var(--cyan),
    0 0 70px rgba(79, 240, 255, 0.55);
  animation: title-pulse 3.4s ease-in-out infinite;
}
@keyframes title-pulse {
  0%, 100% { text-shadow: 0 0 8px var(--cyan), 0 0 28px var(--cyan), 0 0 70px rgba(79,240,255,.5); }
  50%      { text-shadow: 0 0 10px var(--magenta), 0 0 36px var(--magenta), 0 0 90px rgba(255,79,216,.5); }
}

.tagline {
  margin: -0.6rem 0 0;
  font-size: 0.82rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--dim);
}

.btn {
  --btn: var(--cyan);
  background: transparent;
  color: var(--btn);
  border: 1px solid color-mix(in oklab, var(--btn), transparent 45%);
  border-radius: 999px;
  padding: 0.85rem 2.6rem;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--btn);
  box-shadow: 0 0 18px -6px var(--btn), inset 0 0 18px -12px var(--btn);
  transition: transform 0.14s cubic-bezier(.2,.9,.3,1.4), box-shadow 0.2s, background 0.2s;
}
.btn:hover, .btn:focus-visible {
  transform: scale(1.05);
  background: color-mix(in oklab, var(--btn), transparent 88%);
  box-shadow: 0 0 34px -6px var(--btn), inset 0 0 22px -10px var(--btn);
  outline: none;
}
.btn:active { transform: scale(0.97); }
/* Disabled: dim it, kill the glow and hover lift, and let the cursor tell the
   story. Used by the daily-only "Copy results" button on non-daily runs. */
.btn:disabled {
  --btn: var(--dim);
  opacity: 0.4;
  cursor: not-allowed;
  text-shadow: none;
  box-shadow: none;
}
.btn:disabled:hover, .btn:disabled:focus-visible {
  transform: none;
  background: transparent;
  box-shadow: none;
}
.btn.primary { --btn: var(--gold); padding: 1.05rem 3.4rem; font-size: 0.95rem; }
.btn.ghost   { --btn: var(--dim); }

.btn-row { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }

/* The daily's call-to-action on the title: the primary button plus a one-line
   hook, grouped tight so the hook reads as the button's subtitle rather than a
   free-floating grid row. */
.cta { display: grid; justify-items: center; gap: 0.55rem; }
.daily-tag {
  margin: 0;
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
}

/* The nudge on a Practice results screen, pointing at the shareable Daily. */
.results-nudge {
  margin: 0;
  max-width: 24rem;
  font-size: 0.82rem;
  line-height: 1.5;
  color: var(--dim);
}

/* ---------- how to play ---------- */

.panel {
  position: relative;
  max-width: 34rem;
  background: rgba(10, 8, 26, 0.86);
  border: 1px solid rgba(120, 110, 200, 0.28);
  border-radius: 18px;
  /* The extra bottom padding is the button's room. Without it the Back button
     would sit on top of the closing paragraph rather than below it. */
  padding: 2rem 1.8rem 4.6rem;
  text-align: left;
  box-shadow: 0 24px 80px -30px #000;
}

/* Menu and results pages share the card look but lay their content out centred,
   with the buttons in normal flow inside the panel \u2014 so the bottom padding tuned
   for how-to's absolute Back button is dropped here for a symmetric card. */
.panel-center {
  padding: 2.4rem 1.8rem;
  text-align: center;
  display: grid;
  justify-items: center;
  gap: 1.5rem;
}
/* The tagline hugs the title; the grid gap already spaces it, so cancel the
   negative margin it carries from the title-page layout. */
.panel-center .tagline { margin-top: 0; }

/* Sits ON the panel, centred at its foot \u2014 so it reads as part of the card and
   can't be mistaken for chrome floating behind it. */
#btn-howto-back {
  position: absolute;
  left: 50%;
  bottom: 1.4rem;
  transform: translateX(-50%);
}
#btn-howto-back:hover,
#btn-howto-back:focus-visible {
  transform: translateX(-50%) scale(1.05);
}
#btn-howto-back:active {
  transform: translateX(-50%) scale(0.97);
}
.panel h2 {
  margin: 0 0 1.2rem;
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
}
.panel ol { margin: 0; padding-left: 1.3rem; line-height: 1.75; color: #cfcaf0; }
.panel li { margin-bottom: 0.7rem; }
.panel li b { color: #fff; }
.panel .note {
  margin-top: 1.4rem;
  padding-top: 1.1rem;
  border-top: 1px solid rgba(120, 110, 200, 0.2);
  font-size: 0.85rem;
  color: var(--dim);
  line-height: 1.6;
}
.key { color: var(--gold); font-weight: 700; }

/* ---------- HUD ---------- */

#hud {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
  transform: translate(var(--shake-x), var(--shake-y));
}
#hud.show { opacity: 1; }

.hud-top {
  position: absolute;
  top: max(1.1rem, env(safe-area-inset-top));
  left: 0;
  right: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 0 max(1.2rem, env(safe-area-inset-left)) 0 max(1.2rem, env(safe-area-inset-right));
}

.hud-label {
  font-size: 0.6rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 0.25rem;
}

#score {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 700;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 12px var(--accent), 0 0 40px color-mix(in oklab, var(--accent), transparent 55%);
  transition: transform 0.1s;
}
#score.bump { transform: scale(1.12); }

/* Current-phase title \u2014 IMPRINT / HOLD / RECALL. Centred directly above the
   clock ring that surrounds the board, so the instruction lands in the player's
   central field of view rather than in a corner. --ring-top is the ring's top
   edge in px, pushed from the live layout; the extra gap clears the ring's stroke
   and glow so the label sits cleanly above it. The % is a pre-first-layout
   fallback. Same neon uppercase idiom as the HUD labels but brighter and glowing,
   so it reads as a title, not a caption. */
#phase {
  position: absolute;
  left: 50%;
  top: var(--ring-top, 22%);
  /* Bigger gap so the bottom of the (larger) text sits fully clear of the ring's glow. */
  transform: translate(-50%, calc(-100% - 1.4rem));
  white-space: nowrap;
  pointer-events: none;
  font-size: clamp(1.6rem, 4.8vw, 2.1rem);
  font-weight: 800;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan), 0 0 34px color-mix(in oklab, var(--cyan), transparent 55%);
  opacity: 0;
  transition: opacity 0.3s;
}
#phase.show { opacity: 1; }

.hud-right { text-align: right; }

#level {
  font-size: clamp(1.1rem, 3.4vw, 1.5rem);
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}

/* Combo multiplier. Lives in the top HUD row, centred between score and level,
   so it never sits over the board and covers the tiles you're reading. Colour,
   glow, and pulse are all a function of --heat, so it warms up as the streak
   builds. \`--combo-scale\` grows it a touch with each additional hit; it scales
   from its top edge so the growth stays clear of the board below. */
#combo {
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  /* Drop it down so it sits level with the big score number, not the labels. */
  margin-top: 0.95rem;
  transform: scale(var(--combo-scale, 1));
  transform-origin: top center;
  text-shadow:
    0 0 calc(8px + var(--heat) * 20px) var(--accent),
    0 0 calc(24px + var(--heat) * 48px) var(--accent);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
#combo.show { opacity: calc(0.6 + var(--heat) * 0.4); }

/* ---------- recall clock ----------
   The clock itself is the ring around the board, drawn in WebGL. The DOM keeps
   only the numeric readout, sitting under the board where it can be checked
   without pulling the eye off the tiles. */

#clock-wrap {
  position: absolute;
  left: 50%;
  bottom: max(2.6rem, calc(env(safe-area-inset-bottom) + 1.8rem));
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.3s;
}
#clock-wrap.show { opacity: 1; }

#clock-text {
  text-align: center;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
}
#clock-text.warn { color: var(--gold); text-shadow: 0 0 12px var(--gold); }
#clock-text.crit {
  color: var(--red);
  text-shadow: 0 0 16px var(--red);
  animation: crit-pulse 0.45s ease-in-out infinite;
}
@keyframes crit-pulse { 50% { opacity: 0.4; } }

/* A correct tap buys time back \u2014 make the clock visibly jump, so the reward is
   felt and not merely accounted for. \`crit\` wins on an emergency. */
#clock-text.gain:not(.crit) {
  animation: clock-gain 0.32s cubic-bezier(.2,.9,.3,1.4);
}
@keyframes clock-gain {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.22); color: #7dffb0; text-shadow: 0 0 18px #7dffb0; }
  100% { transform: scale(1); }
}

/* The personal-best chase: the number you're hunting, right under your own. */
#pb-chase {
  margin-top: 0.3rem;
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
#pb-chase.show { opacity: 0.7; }
#pb-chase.passed {
  opacity: 1;
  text-shadow: 0 0 12px var(--gold);
}

/* ---------- banner ---------- */

#banner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(1.6rem, 6vw, 3rem);
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  white-space: nowrap;
  color: #fff;
  opacity: 0;
  pointer-events: none;
}
#banner.pop {
  animation: banner-pop 1.1s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes banner-pop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.6); }
  18%  { opacity: 1; transform: translate(-50%,-50%) scale(1.06); }
  70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.02); }
}

/* ---------- results ---------- */

.results-score {
  font-size: clamp(3rem, 13vw, 6rem);
  font-weight: 800;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 16px var(--gold), 0 0 60px rgba(255, 210, 79, 0.5);
}

.breakdown {
  display: grid;
  gap: 0.45rem;
  width: min(92vw, 26rem);
  margin: 0.5rem 0 0.4rem;
}
.row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1rem;
  padding: 0.5rem 0.9rem;
  border-radius: 9px;
  background: rgba(120, 110, 200, 0.07);
  font-size: 0.9rem;
  opacity: 0;
  transform: translateY(10px);
}
/* Each row doesn't just fade \u2014 it overshoots and flashes a brighter fill as it
   lands, so the reveal reads as one item being *highlighted*, then settling. */
.row.in { animation: row-in 0.5s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes row-in {
  0%   { opacity: 0; transform: translateY(10px) scale(0.98); background: rgba(120,110,200,.07); }
  55%  { opacity: 1; transform: translateY(0) scale(1.03); background: rgba(120,110,200,.2); }
  100% { opacity: 1; transform: none; background: rgba(120,110,200,.07); }
}
.row .k { color: var(--dim); letter-spacing: 0.1em; font-size: 0.72rem; text-transform: uppercase; }
.row .rv { display: flex; align-items: baseline; gap: 0.6rem; }
.row .v { font-weight: 700; color: #fff; }
.row .best { color: var(--dim); font-size: 0.72rem; font-weight: 600; }
.row.bad .v { color: var(--red); }

/* A record row: a stronger gold-tinted landing, a lingering gold border, and a
   gold value that outglows the ordinary white ones. Placed after .row.bad so a
   record on the Mistakes row shows gold, not red. */
.row.pb.in { animation: row-in-pb 0.6s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes row-in-pb {
  0%   { opacity: 0; transform: translateY(10px) scale(0.98); }
  55%  { opacity: 1; transform: translateY(0) scale(1.06);
         background: rgba(255,210,79,.22); box-shadow: 0 0 26px rgba(255,210,79,.45); }
  100% { opacity: 1; transform: none;
         background: rgba(255,210,79,.1); box-shadow: 0 0 0 rgba(255,210,79,0); }
}
.row.pb { border: 1px solid rgba(255, 210, 79, 0.35); }
.row.pb .v { color: var(--gold); text-shadow: 0 0 12px rgba(255, 210, 79, 0.7); }
.pb-badge {
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 800;
  color: #1a1330;
  background: var(--gold);
  border-radius: 999px;
  padding: 0.14rem 0.5rem;
  box-shadow: 0 0 14px rgba(255, 210, 79, 0.6);
  animation: badge-pop 0.5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes badge-pop {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* The score finale block: hidden until the tally reaches it, then slides in. */
.score-reveal {
  display: grid;
  justify-items: center;
  gap: 0.15rem;
  margin-top: 0.4rem;
  opacity: 0;
  transform: translateY(12px);
}
.score-reveal.in { animation: score-in 0.6s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes score-in { to { opacity: 1; transform: none; } }
.score-cap { margin-bottom: 0.05rem; }
.score-best { color: var(--dim); font-size: 0.8rem; letter-spacing: 0.05em; min-height: 1em; }
/* When the score is an all-time best, it swells and flares gold as it lands. */
#results-score.pb { animation: score-pb-pulse 1s ease-out; }
@keyframes score-pb-pulse {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.14); text-shadow: 0 0 30px var(--gold), 0 0 90px rgba(255,210,79,.85); }
  100% { transform: scale(1); }
}
.pb-crown {
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 18px var(--gold);
  min-height: 1.2em;
  opacity: 0;
}
.pb-crown.show {
  animation: crown-pop 0.6s cubic-bezier(.16,1,.3,1) forwards,
             crown-glow 1.8s ease-in-out 0.6s infinite;
}
@keyframes crown-pop {
  0%   { opacity: 0; transform: scale(0.6); }
  60%  { opacity: 1; transform: scale(1.15); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes crown-glow {
  0%, 100% { text-shadow: 0 0 18px var(--gold); }
  50%      { text-shadow: 0 0 30px var(--gold), 0 0 60px rgba(255,210,79,.7); }
}

/* Sparkle burst layer: fixed, click-through, above the panel. Sparks are cheap
   CSS-animated dots that fly out radially, droop under a touch of gravity, and
   remove themselves on animationend (see spark() in overlay.ts). */
.results-fx {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: hidden;
}
.spark {
  position: absolute;
  width: var(--sz);
  height: var(--sz);
  margin: calc(var(--sz) / -2) 0 0 calc(var(--sz) / -2);
  border-radius: 50%;
  background: var(--c);
  box-shadow: 0 0 6px var(--c), 0 0 12px var(--c);
  opacity: 0;
  animation-name: spark-fly;
  animation-timing-function: cubic-bezier(.12,.66,.3,1);
  animation-fill-mode: forwards;
}
@keyframes spark-fly {
  0%   { transform: translate(0, 0) scale(0.35); opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: translate(var(--dx), calc(var(--dy) + 54px)) scale(0.7); opacity: 0; }
}

#pb-note {
  font-size: 0.75rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 14px var(--gold);
  min-height: 1.2em;
}
#pb-note.muted {
  color: var(--dim);
  text-shadow: none;
}

#share-out {
  width: min(92vw, 26rem);
  min-height: 8rem;
  background: rgba(5, 3, 13, 0.9);
  border: 1px solid rgba(120, 110, 200, 0.3);
  border-radius: 10px;
  color: var(--ink);
  padding: 0.8rem;
  font-size: 0.8rem;
  line-height: 1.5;
  resize: none;
  display: none;
  pointer-events: auto;
}
#share-out.show { display: block; }

/* ---------- corner controls + notes ---------- */

.corner {
  position: absolute;
  bottom: max(1rem, env(safe-area-inset-bottom));
  right: max(1rem, env(safe-area-inset-right));
  display: flex;
  gap: 0.5rem;
}
.icon-btn {
  position: relative;
  width: 2.5rem;
  height: 2.5rem;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: rgba(10, 8, 26, 0.6);
  border: 1px solid rgba(120, 110, 200, 0.25);
  color: var(--dim);
  font-size: 1rem;
  transition: color 0.2s, border-color 0.2s, transform 0.14s;
}
.icon-btn svg { width: 1.35rem; height: 1.35rem; display: block; }
.icon-btn:hover { color: var(--cyan); border-color: var(--cyan); transform: scale(1.08); }

/* "Off" state for any corner toggle (music, sound FX, motion FX): fade nothing,
   just mark it with a red ring and a diagonal slash across the glyph, so off
   reads as off at a glance. The slash is drawn on top (::after is the last box
   painted) with a light halo so it stays legible over the icon. */
.icon-btn.off { border-color: var(--red); }
.icon-btn.off::after {
  content: '';
  position: absolute;
  left: 10%;
  right: 10%;
  top: calc(50% - 1.5px);
  height: 3px;
  border-radius: 3px;
  background: var(--red);
  box-shadow: 0 0 4px rgba(0, 0, 0, 0.9), 0 0 8px var(--red);
  transform: rotate(-45deg);
}

/* ---------- per-toggle volume pop-ups ---------- */

/* Each channel toggle sits in a .ctrl so its slider pill can anchor above it. */
.ctrl { position: relative; display: flex; }

/* The pop wrapper bridges the visual gap between the toggle and the pill: its box
   sits directly on top of the toggle (bottom: 100%) and its padding-bottom is a
   transparent, hover-active strip spanning the gap \u2014 so moving from the toggle up
   to the slider never leaves the control and never drops the hover.
   #ui is pointer-events:none, so opt back in; the *hidden* state is gated by
   \`visibility\`, whose transition is DELAYED on hide. That keeps the pill
   interactive all through the fade, so moving back onto it before it vanishes
   cancels the fade and brings it fully back \u2014 and once hidden it can't block the
   board. */
.vol-pop {
  position: absolute;
  left: 50%;
  bottom: 100%;
  transform: translateX(-50%) translateY(5px);
  /* max-content so translateX(-50%) uses the pill's real width and centres it on
     the toggle \u2014 without it, shrink-to-fit in the narrow .ctrl mis-sizes the box
     and the pill drifts right. */
  width: max-content;
  padding-bottom: 0.5rem;
  display: flex;
  justify-content: center;
  pointer-events: auto;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s 0.16s;
}
@media (hover: hover) {
  .ctrl:hover > .vol-pop {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%);
    transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s 0s;
  }
}
.ctrl.pop-open > .vol-pop {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%);
  transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s 0s;
}

.vol-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  padding: 0.6rem 0.35rem 0.7rem;
  border-radius: 999px;
  background: rgba(10, 8, 26, 0.92);
  border: 1px solid rgba(120, 110, 200, 0.28);
  box-shadow: 0 24px 80px -30px #000;
}
.vol-pct {
  font-size: 0.66rem;
  color: var(--dim);
  font-variant-numeric: tabular-nums;
}
/* Holds the vertical (rotated) slider; the box is the slider's travel. */
.vol-slot { position: relative; height: 6rem; width: 1.5rem; }

/* Self-drawn groove, centred as a plain element. webkit's own slider track sits a
   couple px off-centre under the -90\xB0 rotate (unfixable via the pseudo), so we make
   that track transparent and draw the visible groove here; the input's thumb, which
   IS centred, rides over it. */
.vol-track {
  position: absolute;
  left: 50%;
  top: 0.5rem;
  bottom: 0.5rem;
  width: 4px;
  transform: translateX(-50%);
  border-radius: 3px;
  background: rgba(120, 110, 200, 0.3);
}

/* A horizontal range rotated to vertical (min at the bottom). Reliable across
   browsers and reuses one set of track/thumb styles. */
.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-90deg);
  width: 6rem; /* becomes the vertical travel after the rotate */
  height: 1.2rem; /* generous hit area for touch */
  /* Kill the UA default margin on range inputs: under the -90\xB0 rotate it turns
     into a horizontal shift, nudging the slider a couple px off the pill's centre. */
  margin: 0;
  background: transparent;
  cursor: pointer;
}
/* Transparent: the visible groove is .vol-track. This still defines the thumb's rail. */
.vol-slider::-webkit-slider-runnable-track { height: 4px; background: transparent; }
.vol-slider::-moz-range-track { height: 4px; background: transparent; }
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 15px;
  height: 15px;
  margin-top: -5.5px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
}
.vol-slider::-moz-range-thumb {
  width: 15px;
  height: 15px;
  border: none;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan);
}
.vol-slider:focus-visible { outline: 2px solid var(--cyan); outline-offset: 4px; border-radius: 3px; }

/* Muted/off: a red slash across the thumb (mirrors the corner icon's slash) so the
   pill shows the channel is silenced while the thumb still marks the chosen level.
   Baked into the thumb as a gradient band, since a pseudo-element can't host a
   child. The track also dims so the whole control reads as off. */
.ctrl.silent .vol-track { background: rgba(120, 110, 200, 0.18); }
.ctrl.silent .vol-slider::-webkit-slider-thumb {
  background:
    linear-gradient(45deg, transparent 37%, var(--red) 37%, var(--red) 63%, transparent 63%),
    var(--cyan);
  box-shadow: 0 0 6px var(--red);
}
.ctrl.silent .vol-slider::-moz-range-thumb {
  background:
    linear-gradient(45deg, transparent 37%, var(--red) 37%, var(--red) 63%, transparent 63%),
    var(--cyan);
  box-shadow: 0 0 6px var(--red);
}

#storage-note {
  position: absolute;
  bottom: max(1rem, env(safe-area-inset-bottom));
  left: max(1rem, env(safe-area-inset-left));
  max-width: 16rem;
  font-size: 0.66rem;
  line-height: 1.5;
  color: var(--dim);
  opacity: 0.75;
  display: none;
}
#storage-note.show { display: block; }

#pause-veil {
  position: absolute;
  inset: 0;
  display: none;
  place-content: center;
  background: rgba(5, 3, 13, 0.78);
  /* Capture presses so the dimmed board behind can't be tapped while paused. */
  pointer-events: auto;
}
#pause-veil.show { display: grid; }

.pause-panel {
  display: grid;
  justify-items: center;
  gap: 1.6rem;
  padding: 2.2rem 2.6rem;
  background: rgba(10, 8, 26, 0.86);
  border: 1px solid rgba(120, 110, 200, 0.28);
  border-radius: 18px;
  box-shadow: 0 24px 80px -30px #000;
}
.pause-title {
  margin: 0;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink);
  text-shadow: 0 0 18px var(--cyan);
}
.pause-actions {
  display: grid;
  gap: 0.7rem;
  width: min(72vw, 15rem);
}
/* The pause buttons stack full-width; the shared .btn padding is tuned for a
   row, so let the grid own the width and keep the horizontal padding modest. */
.pause-actions .btn { width: 100%; padding-left: 1.4rem; padding-right: 1.4rem; }

@media (prefers-reduced-motion: reduce) {
  .title, #clock-fill.crit { animation: none; }
  .page, .btn, #hud, #score { transition-duration: 0.01ms; }
}

    <div class="panel panel-center">
      <h1 class="title">NEON RECALL</h1>
      <p class="tagline">Remember the order. Trace it back.</p>
      <div class="cta">
        <button id="btn-daily" class="btn primary">Do Daily Challenge</button>
        <p class="daily-tag">New board every day · everyone plays the same one</p>

      </div>
    </div>
  </div>

  <div id="howto-page" class="page">
    <div class="panel">
      <h2>How to play</h2>
      <ol>
        <li>Nine tiles, scrambled, showing <span class="key">0</span> to <span class="key">8</span>. They light up <b>in order</b> to show you the path — watch it, then keep watching after it stops.</li>
        <li>The <b>glowing ring</b> around the board is your time. When it empties, the symbols vanish.</li>
        <li>Now <b>tap or swipe</b> the tiles back in that order — 0, 1, 2… You can drag straight through them in one stroke.</li>
        <li>Every tile you touch <span class="key">shows its symbol</span>, right or wrong. A miss still tells you something.</li>
        <li>The grid grows as you climb, and the sequence counts on in <b>hex</b>: after <span class="key">9</span> comes <span class="key">A B C D E F</span>.</li>
        <li>A wrong tile costs points and <span class="key">burns your clock</span> — but the run keeps going. Only the clock can end it.</li>
        <li>Every tile you get <b>right</b> puts time <span class="key">back on the clock</span> — and the longer your streak, the more it gives back. Play clean and you hold the clock off entirely.</li>
        <li>Consecutive hits build a <span class="key">combo</span>. Listen: each one climbs a note. Breaking it drops you back to the bottom.</li>
      </ol>
      <p class="note">

        Accuracy is worth more than speed — but leftover time is a bonus, so don't dawdle.
