precision highp float;

// Numerals, from the runtime-generated SDF atlas.
//
// Legibility is the one fatal risk in this whole game: it is a MEMORY test, and
// if bloom turns "8" into a white blob the game simply does not work. So the
// glyph body is deliberately kept BELOW the bright-pass threshold \u2014 it stays
// crisp and readable and never blooms \u2014 while a thin outline is pushed well
// above it. The digits therefore glow at the edges without ever blowing out.

in vec2 vUv;
in vec4 vColor;
in vec2 vParams;   // x = glow strength

uniform sampler2D uAtlas;
uniform float uBodyValue;    // held under the bloom threshold on purpose
uniform float uOutlineValue; // pushed over it on purpose

out vec4 fragColor;

void main() {
  float d = texture(uAtlas, vUv).r;   // 0.5 = the glyph edge

  // Screen-space AA: crisp at any scale, at any DPR, mid-animation.
  float w = fwidth(d);

  float body = smoothstep(0.5 - w, 0.5 + w, d);

  if (alpha < 0.003) discard;

  fragColor = vec4(col, alpha);
}

precision highp float;

// Phase timer: a glowing arc that depletes around the board's perimeter.
//
// It surrounds the grid deliberately. A corner clock would force the player to
// choose between watching the time and reading the numbers \u2014 during the one
// phase where every millisecond of looking matters. This way the pressure is
// felt in peripheral vision without ever moving the eyes off the tiles.

in vec2 vUv;

uniform vec2 uRes;
uniform vec2 uCenter;     // board centre, px
uniform vec2 uHalfSize;   // board half-extents, px (already inset)
uniform float uRadius;    // corner radius, px
uniform float uLineWidth;
uniform float uRemaining; // 1 -> 0
uniform float uPulse;     // 0..1, accelerates as time runs out
uniform vec3 uColorA;     // full time
uniform vec3 uColorB;     // mid
uniform vec3 uColorC;     // critical
uniform float uAlpha;

out vec4 fragColor;

const float PI = 3.14159265359;

float sdRoundBox(vec2 p, vec2 b, float r) {
  vec2 q = abs(p) - b + r;
  return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
}

/**
 * Arc length along the rounded-rect perimeter, normalised to 0..1, starting at
 * top-centre and running clockwise.
 *
 * The obvious implementation \u2014 atan2(p.y, p.x) / TAU \u2014 is WRONG, and visibly so:
 * angle is not proportional to arc length on a rounded rect, so the depleting
 * head would lurch and change speed as it rounds each corner. The clock would
 * literally tick at a different rate depending on where it was. So compute true
 * arc length: fold into one quadrant, work out whether the nearest point lies on
 * a straight edge or a corner arc, accumulate, then unfold.
 */
float perimeterT(vec2 p, vec2 b, float r) {
  vec2 e = b - r;                // half-extents of the straight sections
  float quarter = e.x + e.y + r * PI * 0.5;  // arc length of one quadrant

  vec2 q = abs(p);
  vec2 c = q - e;

  float lenInQuadrant;
  if (c.x > 0.0 && c.y > 0.0) {
    // On the corner arc. Measure the angle *within* the corner and convert to
    // length, offset by the straight run that precedes it.
    float ang = atan(c.x, c.y);        // 0 at the top edge, PI/2 at the side
    lenInQuadrant = e.x + r * ang;
  } else if (q.x > e.x) {
    // On the vertical (side) edge: past the corner entirely.
    lenInQuadrant = e.x + r * (PI * 0.5) + (e.y - q.y);
  } else {
    // On the horizontal (top/bottom) edge, measured out from the centreline.
    lenInQuadrant = q.x;
  }

  float t = lenInQuadrant / quarter;   // 0..1 within this quadrant

  // Unfold. Quadrants clockwise from top-centre:
  //   x>=0,y<0 : top-right     -> 0..1
  //   x>=0,y>=0: bottom-right  -> 1..2  (reversed)
  //   x<0, y>=0: bottom-left   -> 2..3
  //   x<0, y<0 : top-left      -> 3..4  (reversed)
  float quadrant;
  if (p.x >= 0.0 && p.y < 0.0)        quadrant = 0.0 + t;
  else if (p.x >= 0.0 && p.y >= 0.0)  quadrant = 2.0 - t;
  else if (p.x < 0.0 && p.y >= 0.0)   quadrant = 2.0 + t;
  else                                quadrant = 4.0 - t;

  return quadrant * 0.25;
}

void main() {
  // Reconstruct pixel position (y down, matching the board's layout space).
  vec2 px = vec2(vUv.x * uRes.x, (1.0 - vUv.y) * uRes.y);
  vec2 p = px - uCenter;

  float d = sdRoundBox(p, uHalfSize, uRadius);

  // Keep only the ring.
  float ring = 1.0 - smoothstep(0.0, uLineWidth, abs(d));
  if (ring <= 0.001) discard;

  float t = perimeterT(p, uHalfSize, uRadius);

  // Deplete: the arc shrinks back toward the start point.
  float visible = step(t, uRemaining);

  // Colour by time remaining, not by position \u2014 the whole arc changes together,
  // which reads as "the situation is bad" rather than "this bit is bad".
  vec3 col = mix(uColorA, uColorB, smoothstep(0.60, 0.35, uRemaining));
  col = mix(col, uColorC, smoothstep(0.25, 0.08, uRemaining));

  float intensity = 2.0 + 6.0 * uPulse;

  // The comet head: a hot spot at the leading edge. Under bloom this becomes the
  // most alive thing on screen, and it's what makes the timer feel like it's
  // being *consumed* rather than merely redrawn.
  float head = exp(-pow((t - uRemaining) * 260.0, 2.0));

  vec3 outCol = col * ring * visible * intensity;
  outCol += mix(col, vec3(1.0), 0.6) * head * ring * 8.0;

  float alpha = ring * max(visible, head) * uAlpha;
  fragColor = vec4(outCol, alpha);
}
`;

  function countUp(el, to, durationMs = 900, withSound = true) {
    const from = 0;
    const start = performance.now();
    let lastTick = 0;
    const step = (now) => {
      const t = Math.min(1, (now - start) / durationMs);
      const eased = easeOutExpo(t);
      const value = Math.round(from + (to - from) * eased);
      el.textContent = value.toLocaleString("en-US");
      if (withSound && audio.sfxReady && now - lastTick > 55 && t < 1) {
        lastTick = now;
        click(900 + eased * 1800, 0.035);
      }
      if (t < 1) {
        requestAnimationFrame(step);

        el.textContent = to.toLocaleString("en-US");
      }
    };
    requestAnimationFrame(step);
  }

        },
        tap: (i) => this.onTileCommit(i),
        skipImprint: () => {
          if (this.machine.is("IMPRINT")) this.session.imprintLeft = 0;
        },
        state: () => this.machine.state,
        view: (v) => this.renderer.debugView = v,
        fps: () => this.perf.fps,
        lowHdr: () => this.renderer.lowHdr,
        atlas: () => this.renderer.atlasStats
      };
      window.__mg = hooks;
      document.title = `NEON RECALL | atlas=${JSON.stringify(this.renderer.atlasStats)} hdr=${!this.renderer.lowHdr}`;
      const params = new URLSearchParams(location.search);
      const view = params.get("view");
      if (view) this.renderer.debugView = view;
      const speed = Number(params.get("speed"));
      if (Number.isFinite(speed) && speed > 0) this.timeScale = speed;
      if (params.get("page") === "howto") {
        this.machine.go("HOWTO");
        this.overlay.showHowTo();
      }
      const goto = params.get("goto");
      const mistakes = Number(params.get("miss") ?? 0) || 0;
      if (goto) {
        bus.on("state:enter", ({ state }) => {
          if (state === "IMPRINT" && (goto === "recall" || goto === "results")) {
            this.session.imprintLeft = 0;
          }
          if (state === "HOLD" && (goto === "recall" || goto === "results")) {
            this.session.holdLeft = 0;
          }
          if (state === "RECALL" && goto === "results") {
            setTimeout(() => {
              hooks.solve(mistakes, Math.max(1, this.session.board.count - 2));
              this.session.recallLeft = 0;
            }, 60);
          }
          if (state === "RECALL" && goto === "clear") {
            setTimeout(() => hooks.solve(mistakes), 60);
          }
          if (state === "RECALL" && goto === "mid") {
            setTimeout(() => hooks.solve(mistakes, Math.ceil(this.session.board.count / 2)), 60);
          }
        });
      }
      const level = Number(params.get("auto"));
      if (Number.isFinite(level) && level >= 1) {
        hooks.start(level, params.get("daily") === "1");
      }
      setInterval(() => {
        const s = this.session;
        document.title = `state=${this.machine.state} lvl=${s.level} score=${s.score} expected=${s.expected} recall=${s.recallLeft.toFixed(1)} err=${s.totalErrors}`;
      }, 200);
    }
    wireLifecycle() {
      const unlock = () => {
        if (this.audioUnlocked) return;
        this.audioUnlocked = true;
        void audio.unlock().then(() => this.music.start());
      };
      window.addEventListener("pointerdown", unlock, { once: true });
      window.addEventListener("keydown", unlock, { once: true });
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          this.machine.pause();
          this.overlay.setPaused(this.machine.isPaused);
        } else {
          void audio.unlock();
          this.machine.resume();
          this.overlay.setPaused(this.machine.isPaused);
        }
      });
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (this.machine.isPaused) this.machine.resume();
          else this.machine.pause();
          this.overlay.setPaused(this.machine.isPaused);
        }
        if (e.key >= "1" && e.key <= "5") {
          const views = ["final", "scene", "bgblur", "bright", "bloom"];
          this.renderer.debugView = views[Number(e.key) - 1];
        }
      });
    }
    wireEvents() {
      const PHASE_LABEL = {
        IMPRINT: "Imprint",
        HOLD: "Hold",
        RECALL: "Recall"
      };
      bus.on("state:enter", ({ state }) => {
        this.overlay.setPhase(PHASE_LABEL[state] ?? "");
      });
      bus.on("level:clear", ({ level, perfect }) => {
        this.overlay.banner(perfect ? "Perfect" : `Level ${level}`);
      });
      bus.on("ghost:passed", () => {
        this.overlay.banner("New best");
        this.overlay.markGhostPassed();
      });
      bus.on("score:changed", ({ score }) => this.overlay.setScore(score));
      bus.on("tile:correct", ({ timeGained }) => {
        if (timeGained > 5e-3) this.overlay.pulseClock();
      });
    }
    // -- flow -----------------------------------------------------------------
    toTitle() {
      this.riser.stop();
      this.input.enabled = false;
      this.juice.reset();
      this.machine.go("TITLE");
      this.overlay.showTitle();
      this.music.set(0.36, 0);
    }
    /**
     * `startLevel` lets "Again" drop you back in where the run ended rather than
     * at level 1. Grinding through nine levels you've already proven you can clear
     * is the fastest way to make someone stop playing — the interesting part of
     * the run is the level that just beat you, so put them back on it immediately.
     * The board is freshly seeded, so it's a new puzzle at the same difficulty.
     */
    startRun(daily, startLevel = 1, seed) {
      this.isDaily = daily;
      this.dateKey = daily ? utcDateKey() : null;
      this.runSeed = seed ?? rngFx() * 4294967295 >>> 0;
      const rngFor = daily ? (level) => dailyRng(this.dateKey, level) : (
        // Derived from (runSeed, level), so any level of this run can be rebuilt
        // exactly. Still routed through the seeded PRNG, so the board logic has
        // exactly one code path whether it's a daily or an endless run.
        (level) => mulberry32(xmur3(`${this.runSeed}:${level}`))
      );
      this.session = new Session(rngFor, daily, startLevel);
      this.juice.reset();
      this.overlay.showGame();
      this.overlay.setScore(0);
      this.overlay.setCombo(0, 1);
      this.beginLevel(startLevel);
    }
    beginLevel(level) {
      this.session.startLevel(level);
      layoutBoard(this.session.board, this.renderer.cssWidth, this.renderer.cssHeight);
      this.renderer.tileRadius = this.session.board.tileRadius;
      this.revealAnim = new Array(this.session.board.count).fill(0);
      this.tileScale = new Array(this.session.board.count).fill(1);
      this.numberReveal = new Array(this.session.board.count).fill(0);
      this.hintValue = 0;
      this.hintPulse = 0;
      this.lastHintStep = -1;
      this.input.enabled = false;
      this.input.rects = [];
      this.overlay.setLevel(level);
      this.overlay.showClock(false);
      this.machine.go("COUNTDOWN");
      this.overlay.banner(`Level ${level}`);
    }
    onTileCommit(index) {
      if (!this.machine.is("RECALL")) return;
      const alreadySolved = this.session.solved[index];
      this.session.tap(index);
      if (!alreadySolved) this.numberReveal[index] = 1;
      if (navigator.vibrate) {
        const wasCorrect = this.session.solved[index];
        navigator.vibrate(wasCorrect ? 12 : [22, 30, 22]);
      }
      this.overlay.setCombo(this.session.combo, this.session.comboMultiplier);
      if (this.session.levelComplete) {
        this.session.recordLevelScore();
        this.session.completeLevel();
        this.input.enabled = false;
        this.machine.go("LEVEL_CLEAR");
      }
    }
    resize() {
      const w = this.canvas.clientWidth;
      const h = this.canvas.clientHeight;
      if (w === 0 || h === 0) return;
      this.canvas.width = Math.round(w * this.renderer.dpr) || 1;
      this.canvas.height = Math.round(h * this.renderer.dpr) || 1;
      this.renderer.resize(w, h);
      this.canvas.width = this.renderer.width;
      this.canvas.height = this.renderer.height;
      if (this.session?.board) {
        layoutBoard(this.session.board, w, h);
        this.renderer.tileRadius = this.session.board.tileRadius;
      }
    }
    step(dt, elapsed, realDt) {
      this.perf.sample(realDt);
      if (this.machine.isPaused) {
        this.overlay.setPaused(true);
        this.music.set(0, 0);
        this.music.update();
        this.buildFrame(elapsed, 0);
        this.renderer.render(this.frame);
        return;
      }
      this.overlay.setPaused(false);
      this.machine.update(dt);
      this.updatePhase(dt);
      this.juice.update(dt, this.renderer.cssWidth, this.renderer.cssHeight);
      this.music.update();
      this.buildFrame(elapsed, dt);
      this.renderer.render(this.frame);
    }
    updatePhase(dt) {
      const s = this.session;
      const m = this.machine;
      const t = CFG.timings;
      switch (m.state) {
        case "TITLE":
        case "HOWTO":
          for (let i = 0; i < this.revealAnim.length; i++) {
            this.revealAnim[i] = damp(this.revealAnim[i], 0.45, 3, dt);
          }
          this.music.set(0.36, 0);
          break;
        case "COUNTDOWN": {
          const dur = s.level === 1 ? t.countdownFirst : t.countdownNext;
          for (let i = 0; i < s.board.count; i++) {
            const delay = i * 0.03;
            const p = clamp((m.time - delay) / 0.45, 0, 1);
            this.revealAnim[i] = p;
            this.tileScale[i] = p > 0 ? easeOutBack(p) : 0;
          }
          this.music.set(0.3, 0);
          if (m.time >= dur) {
            m.go("IMPRINT");
            this.riser.start();
            this.nextTickAt = 0;
            this.tickAccum = 0;
          }
          break;
        }
        case "IMPRINT": {
          s.imprintLeft = Math.max(0, s.imprintLeft - dt);
          const progress = 1 - s.imprintLeft / s.imprintTotal;
          this.riser.update(this.tensionProgress());
          this.music.set(0.18, 0);
          this.updateHintSweep(s.imprintTotal, progress);
          this.tickAccum += dt;
          const remaining = s.imprintLeft / s.imprintTotal;
          const interval = lerp(
            CFG.audio.tickIntervalStart,
            CFG.audio.tickIntervalEnd,
            1 - remaining
          );
          if (this.tickAccum >= interval) {
            this.tickAccum = 0;
            imprintTick(remaining);
            bus.emit("imprint:tick", { remaining: s.imprintLeft, total: s.imprintTotal });
          }
          if (remaining < 0.25 && rngFx() < 0.3) {
            const head = this.arcHeadPosition(s.board.bounds, remaining);
            this.juice.particles.trailMote(head.x, head.y, COLORS.red);
          }
          for (let i = 0; i < s.board.count; i++) {
            this.revealAnim[i] = 1;
            this.tileScale[i] = damp(this.tileScale[i], 1, 10, dt);
          }
          if (s.imprintLeft <= 0) {
            m.go("HOLD");
            this.juice.blackoutPulse(
              s.board.bounds.x + s.board.bounds.w / 2,
              s.board.bounds.y + s.board.bounds.h / 2
            );
          }
          break;
        }
        case "HOLD": {
          s.holdLeft = Math.max(0, s.holdLeft - dt);
          this.riser.update(this.tensionProgress());
          this.music.set(0.05, 0);
          for (let i = 0; i < s.board.count; i++) {
            this.revealAnim[i] = damp(this.revealAnim[i], 0.16, 7, dt);
          }
          if (s.holdLeft <= 0) {
            this.riser.stop();
            m.go("RECALL");
            this.input.rects = s.board.rects;
            this.input.enabled = true;
            this.overlay.showClock(true);
          }
          break;
        }
        case "RECALL": {
          s.recallLeft -= dt;
          this.music.set(0.55, this.juice.heat);
          this.overlay.setClock(s.recallLeft, s.recallTotal);
          this.overlay.setGhost(s.ghostTarget);
          for (let i = 0; i < s.board.count; i++) {
            const p = clamp((m.time - i * CFG.timings.recallRevealStagger) / 0.3, 0, 1);
            this.revealAnim[i] = easeOutCubic(p);
            this.tileScale[i] = damp(this.tileScale[i], 1, 12, dt);
            if (s.solved[i]) this.numberReveal[i] = 1;
            else if (this.numberReveal[i] > 0) {
              this.numberReveal[i] = Math.max(0, this.numberReveal[i] - dt / 1.1);
            }
          }
          if (s.recallLeft <= 0) {
            s.recallLeft = 0;
            this.input.enabled = false;
            this.overlay.showClock(false);
            s.endRun();
            m.go("RUN_END");
          }
          break;
        }
        case "LEVEL_CLEAR": {
          this.music.set(0.5, this.juice.heat);
          this.overlay.showClock(false);
          if (m.time >= t.levelClear) {
            this.beginLevel(s.level + 1);
          }
          break;
        }
        case "RUN_END": {
          this.music.set(0.1, 0);
          if (m.time >= t.runEnd) {
            m.go("RESULTS");
            this.showResults();
          }
          break;
        }
        case "RESULTS":
          this.music.set(0.2, 0);
          break;
        default:
          break;
      }
    }
    /**
     * Lights the tiles 1..N in ascending order across the first part of the
     * memorize window, each with a short pulse and a rising pentatonic note.
     *
     * The sweep deliberately finishes early (CFG.hint.sweepFraction) rather than
     * running to the buzzer: the remaining seconds are silent self-test time, and
     * that's where the sequence actually consolidates. A hint that ran right up to
     * the blackout would leave nothing to recall but the last note.
     */
    updateHintSweep(total, progress) {
      const n = this.session.board.count;
      const sweep = CFG.hint.sweepFraction;
      if (progress >= sweep) {
        this.hintValue = 0;
        this.hintPulse = 0;
        return;
      }
      const slot = total * sweep / n;
      const step = Math.min(n - 1, Math.floor(progress / sweep * n));
      const within = progress / sweep * n % 1;
      if (step !== this.lastHintStep) {
        this.lastHintStep = step;
        hintTone(step, n);
        const idx = this.session.board.values.indexOf(step + 1);
        if (idx >= 0) {
          const r = this.session.board.rects[idx];
          if (r) this.juice.particles.burst(r.x + r.w / 2, r.y + r.h / 2, COLORS.cyan, 6, 150, 3);
        }
      }
      const { attack, release } = CFG.hint;
      const env = within < attack ? within / attack : within > 1 - release ? Math.max(0, (1 - within) / release) : 1;
      this.hintValue = step + 1;
      this.hintPulse = env;
      void slot;
    }
    showResults() {
      const s = this.session;
      const result = {
        score: s.score,
        level: s.level,
        errorsPerLevel: s.errorsPerLevel,
        perfectLevels: s.perfectLevels
      };
      const isNewPB = !this.isDaily && s.score > s.pb.score;
      this.overlay.showResults(s, result, this.dateKey, isNewPB);
    }
    /**
     * The riser's build, as a single 0→1 ramp across the imprint AND hold phases
     * combined. This is what lets the tension keep climbing through the greyed-out
     * wait instead of resolving the instant the pattern disappears — the panic peak
     * lands right as recall opens, and the longer hold at high levels stretches it.
     */
    tensionProgress() {
      const s = this.session;
      const span = s.imprintTotal + s.holdTotal;
      if (span <= 0) return 1;
      const elapsed = s.imprintTotal - s.imprintLeft + (s.holdTotal - s.holdLeft);
      return clamp(elapsed / span, 0, 1);
    }
    /** Where the depleting arc's head currently sits, in CSS px. */
    arcHeadPosition(b, remaining) {
      const per = 2 * (b.w + b.h);
      const d = remaining * per;
      const cx = b.x + b.w / 2;
      if (d < b.w / 2) return { x: cx + d, y: b.y };
      if (d < b.w / 2 + b.h) return { x: b.x + b.w, y: b.y + (d - b.w / 2) };
      if (d < b.w / 2 + b.h + b.w) return { x: b.x + b.w - (d - b.w / 2 - b.h), y: b.y + b.h };
      if (d < b.w / 2 + 2 * b.h + b.w) return { x: b.x, y: b.y + b.h - (d - b.w / 2 - b.h - b.w) };
      return { x: b.x + (d - b.w / 2 - 2 * b.h - b.w), y: b.y };
    }
    buildFrame(elapsed, _dt) {
      const f = this.frame;
      const s = this.session;
      const m = this.machine;
      const j = this.juice;
      f.time = elapsed;
      f.heat = j.heat;
      let dim = 1;
      let fade = 1;
      if (m.is("HOLD")) {
        const p = clamp(m.time / CFG.hold.fade, 0, 1);
        dim = lerp(1, CFG.hold.dim, smoothstep(p));
      } else if (m.is("RECALL")) {
        dim = lerp(CFG.hold.dim, 1, clamp(m.time / 0.35, 0, 1));
      }
      if (m.is("RUN_END")) {
        const p = clamp(m.time / CFG.timings.runEnd, 0, 1);
        fade = lerp(1, 0.22, p);
        f.desat = p;
      } else if (m.is("RESULTS")) {
        fade = 0.22;
        f.desat = 1;
      } else if (m.is("HOLD")) {
        const p = clamp(m.time / CFG.hold.fade, 0, 1);
        f.desat = lerp(0, CFG.hold.desat, smoothstep(p));
      } else {
        f.desat = damp(f.desat, 0, 6, _dt);
      }
      f.dim = dim;
      f.fade = fade;
      f.shakeX = j.shake.x;
      f.shakeY = j.shake.y;
      f.shakeRot = j.shake.rot;
      this.overlay.setShake(j.shake.x * this.renderer.cssWidth, j.shake.y * this.renderer.cssHeight);
      this.overlay.setHeat(j.heat);
      f.ripples = j.ripples.uniform;
      f.flashAmount = j.flashAmount;
      f.flashColor = j.flashColor;
      f.ca = j.ca;
      f.bloomStrength = CFG.fx.bloomStrength * (1 + j.heat * 0.25);
      f.vignette = 0.5 + j.heat * 0.12;
      f.grain = this.overlay.reducedMotion ? 0 : 0.018;
      f.particles = j.particles.buffer;
      f.particleCount = j.particles.count;
      const tiles = [];
      const board = s.board;
      const paused = m.isPaused;
      const showNumbers = !paused && m.is("IMPRINT", "COUNTDOWN");
      for (let i = 0; i < board.count; i++) {
        const r = board.rects[i];
        if (!r) continue;
        const solved = !paused && s.solved[i] === true;
        const pop = j.tilePop[i];
        const popScale = pop > 0 ? 1 + 0.18 * Math.sin(pop * Math.PI) : 0;
        const breathe = 1 + Math.sin(elapsed * 0.3 + i * 0.7) * 5e-3;
        const isIdle = m.is("TITLE", "HOWTO");
        const hinted = m.is("IMPRINT") && this.hintValue > 0 && board.values[i] === this.hintValue ? this.hintPulse : 0;
        const rim = solved ? COLORS.gold : hinted > 0 ? COLORS.gold : isIdle ? i % 2 === 0 ? COLORS.cyan : COLORS.magenta : COLORS.cyan;
        tiles.push({
          cx: r.x + r.w / 2,
          cy: r.y + r.h / 2,
          hw: r.w / 2,
          hh: r.h / 2,
          rim,
          rimIntensity: 1.1 + j.heat * 0.9 + hinted * 1.6,
          scale: (this.tileScale[i] ?? 1) * (1 + popScale * 0.16 + hinted * 0.07) * breathe,
          flash: j.tileFlash[i],
          // `lit` drives the tile's inner glow. Solved tiles hold it; a hinted tile
          // borrows it for the length of its pulse.
          lit: solved ? 1 : hinted,
          reveal: this.revealAnim[i] ?? 0
        });
      }
      f.tiles = tiles;
      const glyphs = [];
      const symbol = (r, value, color, alpha, glow) => {
        glyphs.push({
          x: r.x + r.w / 2,
          y: r.y + r.h / 2,
          size: r.h * 0.46,
          text: symbolFor(value),
          color,
          alpha,
          glow
        });
      };
      if (showNumbers) {
        for (let i = 0; i < board.count; i++) {
          const r = board.rects[i];
          if (!r) continue;
          const a = this.revealAnim[i] ?? 0;
          if (a <= 0.01) continue;
          const hinted = m.is("IMPRINT") && board.values[i] === this.hintValue ? this.hintPulse : 0;
          const color = hinted > 0.05 ? COLORS.gold : COLORS.white;
          symbol(r, board.values[i], color, a, 1 + hinted * 1.2);
        }
      } else if (m.is("RECALL")) {
        for (let i = 0; i < board.count; i++) {
          const r = board.rects[i];
          if (!r) continue;
          const rev = this.numberReveal[i] ?? 0;
          if (rev <= 0.01) continue;
          const solved = s.solved[i] === true;
          symbol(
            r,
            board.values[i],
            solved ? COLORS.gold : COLORS.red,
            solved ? 1 : rev,
            solved ? 1 : 1.5
          );
        }
      }
      for (const fl of j.floaters) {
        const p = fl.age / fl.life;
        glyphs.push({
          x: fl.x,
          y: fl.y,
          size: fl.size * (1 + (1 - p) * 0.25),
          text: fl.text,
          color: fl.color,
          alpha: 1 - p * p,
          glow: 1.4
        });
      }
      f.glyphs = glyphs;
      const arcs = [];
      const b = board.bounds;
      if (b.w > 0) {
        const pad = 22;
        const ring = (remaining, inset, lineWidth, colors) => {
          const urgency = 1 - remaining;
          return {
            cx: b.x + b.w / 2,
            cy: b.y + b.h / 2,
            hw: b.w / 2 + pad - inset,
            hh: b.h / 2 + pad - inset,
            radius: 30 - inset * 0.5,
            lineWidth,
            remaining,
            // The pulse accelerates as time runs out — the ring itself gets agitated.
            pulse: 0.35 + 0.65 * Math.abs(Math.sin(elapsed * (3 + urgency * 16))) * smoothstep(urgency),
            alpha: 1,
            colorA: colors[0],
            colorB: colors[1],
            colorC: colors[2]
          };
        };
        if (m.is("IMPRINT")) {
          const remaining = s.imprintTotal > 0 ? s.imprintLeft / s.imprintTotal : 0;
          arcs.push(
            ring(remaining, 0, 3.2, [
              [0.25, 1, 0.55],
              [1, 0.78, 0.22],
              [1, 0.2, 0.28]
            ])
          );
        }
        if (m.is("HOLD")) {
          const remaining = s.holdTotal > 0 ? clamp(s.holdLeft / s.holdTotal, 0, 1) : 0;
          arcs.push(
            ring(remaining, 0, 3.6, [
              [0.72, 0.42, 1],
              // violet
              [0.95, 0.45, 0.95],
              // magenta
              [1, 0.28, 0.5]
              // hot pink-red
            ])
          );
        }
        if (m.is("RECALL")) {
          const remaining = s.recallTotal > 0 ? clamp(s.recallLeft / s.recallTotal, 0, 1) : 0;
          arcs.push(
            ring(remaining, 0, 3.2, [
              [0.31, 0.94, 1],
              // cyan — distinct from the imprint ring's green
              [1, 0.78, 0.22],
              [1, 0.2, 0.28]
            ])
          );
        }
      }
      f.arcs = arcs;
      const trailIdle = performance.now() - this.input.lastPointMs;
      const trailAlpha = clamp(
        1 - Math.max(0, trailIdle - CFG.render.trailFadeGraceMs) / CFG.render.trailFadeMs,
        0,
        1
      );
      f.trail = trailAlpha > 0.01 && this.input.trail.length >= 4 && m.is("RECALL") ? {
        points: this.input.trail,
        color: j.heat > 0.5 ? COLORS.gold : COLORS.cyan,
        alpha: trailAlpha,
        width: 9
      } : null;
    }
  };
  function boot() {
    const style = document.createElement("style");
    style.textContent = style_default;
    document.head.appendChild(style);
    const canvas = document.getElementById("gl");
    if (!canvas) return fatal("Canvas element missing.");
    try {
      new Game(canvas);
    } catch (err) {
      fatal(err instanceof Error ? err.message : String(err));
    }
  }
